networks:
  netsentinel_net:
    driver: bridge

volumes:
  timescaledb_data:
  redis_data:
  prometheus_data:
  grafana_data:

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: netsentinel_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - netsentinel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: netsentinel_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - netsentinel_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  test-backend:
    build:
      context: ./test-backend
      dockerfile: Dockerfile
    container_name: netsentinel_test_backend
    restart: unless-stopped
    networks:
      - netsentinel_net

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: netsentinel_proxy
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - netsentinel_net
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      test-backend:
        condition: service_started

  python-sidecar:
    build:
      context: ./python-sidecar
      dockerfile: Dockerfile
    container_name: netsentinel_python_sidecar
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - netsentinel_net
    depends_on:
      timescaledb:
        condition: service_healthy
      proxy:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    container_name: netsentinel_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - netsentinel_net
    depends_on:
      - proxy

  grafana:
    image: grafana/grafana:latest
    container_name: netsentinel_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - netsentinel_net
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    container_name: netsentinel_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - netsentinel_net
    depends_on:
      - proxy